<!DOCTYPE html>
<html dir="rtl" lang="ar" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>صانع التهنئة الذكي | asfari.net</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;800&family=Cairo:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-purple: #6c5ce7;
            --secondary-turquoise: #00cec9;
            --dark-bg: #0f0c29;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; transition: 0.3s ease; }
        
        body { 
            padding: 20px; 
            background: radial-gradient(circle at top right, #302b63, #0f0c29); 
            color: white; 
            text-align: center; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        header { 
            width: 100%; 
            max-width: 600px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px; 
        }

        .nav-links { display: flex; gap: 10px; align-items: center; }
        
        .home-btn { 
            background: var(--glass); 
            border: 1px solid var(--glass-border); 
            color: white; 
            padding: 8px 15px; 
            border-radius: 12px; 
            text-decoration: none; 
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .lang-btn { 
            background: transparent; 
            border: 1px solid var(--secondary-turquoise); 
            color: var(--secondary-turquoise); 
            padding: 7px 15px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 0.85rem;
        }

        h1 { 
            margin: 10px 0 25px; 
            font-weight: 800; 
            font-size: 1.8rem; 
            background: linear-gradient(to left, #fff, var(--secondary-turquoise));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-container { 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border); 
            padding: 25px; 
            border-radius: 25px; 
            width: 100%; 
            max-width: 500px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
        }
        
        input { 
            width: 100%; 
            padding: 16px; 
            border-radius: 15px; 
            border: 1px solid var(--glass-border);
            text-align: center; 
            font-size: 1.1rem; 
            margin-bottom: 20px; 
            background: rgba(255,255,255,0.95); 
            color: #333; 
            font-weight: 800; 
        }

        .event-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        
        .event-btn { 
            padding: 12px; 
            border-radius: 12px; 
            border: 1px solid var(--glass-border); 
            background: var(--glass); 
            color: #fff; 
            cursor: pointer; 
            font-size: 0.9em; 
        }

        .event-btn.active { 
            background: var(--secondary-turquoise); 
            color: var(--dark-bg); 
            font-weight: 800; 
            border: none;
            transform: scale(1.05);
        }

        .action-btns { display: flex; gap: 10px; width: 100%; margin-top: 5px; }
        .action-btns button { 
            flex: 1; 
            padding: 15px; 
            border-radius: 15px; 
            border: none; 
            color: white; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        #cardCanvas { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="nav-links">
            <a href="index.html" class="home-btn" id="homeBtn"><i class="fas fa-home"></i> الرئيسية</a>
            <button class="lang-btn" onclick="toggleLanguage()">English</button>
        </div>
        <span style="font-weight: 800; color: var(--secondary-turquoise);">asfari.net</span>
    </header>

    <h1 id="mainTitle">اصنع تهنئتك الخاصة</h1>

    <div class="main-container">
        <input type="text" id="nameInput" placeholder="أدخل الاسم هنا" oninput="updateLiveView()">
        
        <p id="chooseText" style="margin-bottom: 15px; font-weight: 300; font-size: 0.9em;">اختر المناسبة:</p>
        <div class="event-grid" id="eventGrid"></div>
        
        <div class="action-btns">
            <button id="dlBtn" onclick="downloadCard()" style="background: #27ae60;">
                <i class="fas fa-download"></i> تحميل
            </button>
            <button id="shBtn" onclick="shareWhatsApp()" style="background: #25D366;">
                <i class="fab fa-whatsapp"></i> واتساب
            </button>
        </div>
    </div>

    <canvas id="cardCanvas"></canvas>

    <script>
        let currentLang = 'ar';
        let currentEvent = 'ramadan';
        const canvas = document.getElementById('cardCanvas');
        const ctx = canvas.getContext('2d');
        const bgImage = new Image();
        bgImage.crossOrigin = "anonymous";

        const translations = {
            ar: {
                mainTitle: "اصنع تهنئتك الخاصة", chooseText: "اختر المناسبة:",
                dlBtn: "تحميل", shBtn: "واتساب", homeBtn: "الرئيسية",
                placeholder: "أدخل الاسم هنا", langBtn: "English",
                events: {
                    ramadan: "🌙 تهنئة رمضان", fitr: "🍬 تهنئة عيد الفطر", adha: "🐑 تهنئة عيد الأضحى",
                    hijri: "🕌 تهنئة العام الهجري", newyear: "🎄 تهنئة رأس السنة", birthday: "🎂 تهنئة عيد ميلاد"
                }
            },
            en: {
                mainTitle: "Greeting Maker", chooseText: "Choose Occasion:",
                dlBtn: "Download", shBtn: "WhatsApp", homeBtn: "Home",
                placeholder: "Enter name", langBtn: "عربي",
                events: {
                    ramadan: "🌙 Ramadan", fitr: "🍬 Eid Fitr", adha: "🐑 Eid Adha",
                    hijri: "🕌 New year Hijri", newyear: "🎄 New Year", birthday: "🎂 Birthday"
                }
            }
        };

        const configs = {
            ramadan: { bg: 'ramadan-bg.png', color: '#2c3e50', y: 0.669, font: "'Cairo', sans-serif", wm: 'white', waMsg: 'رمضان مبارك 🌙' },
            fitr: { bg: 'eid-fitr.png', color: '#ffffff', y: 0.92, font: "'Cairo', sans-serif", wm: 'white', waMsg: 'عيدكم مبارك 🍬' },
            adha: { bg: 'eid-adha.png', color: '#E5B49E', y: 0.90, font: "'Cairo', sans-serif", wm: 'black', waMsg: 'أضحى مبارك 🐑' },
            hijri: { bg: 'hijri.png', color: '#ffffff', y: 0.78, font: "'Cairo', sans-serif", wm: 'white', waMsg: 'عام هجري مبارك 🕌' },
            newyear: { bg: 'new-year.png', color: '#ffffff', y: 0.74, font: "'Cairo', sans-serif", wm: 'white', waMsg: 'عام جديد سعيد 🎄' },
            birthday: { bg: 'birthday.png', color: '#2c3e50', y: 0.92, font: "'Tajawal', sans-serif", wm: 'black', waMsg: 'أتمنى لك عيد ميلاد سعيد 🎂' }
        };

        function renderButtons() {
            const grid = document.getElementById('eventGrid');
            grid.innerHTML = '';
            Object.keys(configs).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `event-btn ${currentEvent === key ? 'active' : ''}`;
                btn.innerText = translations[currentLang].events[key];
                btn.onclick = () => setEvent(key);
                grid.appendChild(btn);
            });
        }

        function setEvent(ev) {
            currentEvent = ev;
            bgImage.src = configs[ev].bg;
            bgImage.onload = () => updateLiveView();
            renderButtons();
        }

        function updateLiveView() {
            const name = document.getElementById('nameInput').value.trim();
            if (bgImage.complete && bgImage.width > 0) {
                canvas.width = bgImage.width;
                canvas.height = bgImage.height;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(bgImage, 0, 0);

                const config = configs[currentEvent];
                
                // 1. رسم الاسم مع "الاحتواء الذكي الصارم جداً"
                if (name) {
                    // تحديد إطار النص (55% من عرض الصورة لضمان البقاء داخل الزخارف)
                    const safeWidth = canvas.width * 0.55;
                    let fontSize = Math.floor(canvas.width * 0.08); 
                    ctx.font = `bold ${fontSize}px ${config.font}`;
                    ctx.fillStyle = config.color;
                    ctx.textAlign = "center";
                    
                    let metrics = ctx.measureText(name);
                    // تصغير الخط حتى يتناسب مع الإطار الضيق المحدد
                    while (metrics.width > safeWidth && fontSize > 10) {
                        fontSize -= 2;
                        ctx.font = `bold ${fontSize}px ${config.font}`;
                        metrics = ctx.measureText(name);
                    }
                    ctx.fillText(name, canvas.width / 2, canvas.height * config.y);
                }

                // 2. العلامة المائية في الزاوية اليسرى السفلية (بدون هوامش)
                const wmSize = Math.floor(canvas.width * 0.025);
                ctx.font = `bold ${wmSize}px 'Tajawal'`;
                ctx.textAlign = "left";
                
                // تحديد اللون حسب المناسبة (تم تعديل السنة الجديدة لتصبح بيضاء)
                ctx.fillStyle = (config.wm === 'white') ? "rgba(255, 255, 255, 0.7)" : "rgba(0, 0, 0, 0.6)";
                
                // رسم النص في الزاوية الصفرية تماماً
                // نستخدم wmSize لرفع النص قليلاً عن الحافة السفلية ليظهر بالكامل
                ctx.fillText("asfari.net", 0, canvas.height - (wmSize / 4));
            }
        }

        function downloadCard() {
            const name = document.getElementById('nameInput').value.trim();
            if(!name) { alert(currentLang === 'ar' ? "يرجى كتابة الاسم" : "Please enter name"); return; }
            const link = document.createElement('a');
            link.download = `Asfari-${currentEvent}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

          function shareWhatsApp() {
            const config = configs[currentEvent];
            const name = document.getElementById('nameInput').value.trim();
            const greeting = name ? `${config.waMsg} من ${name}` : config.waMsg;
            const text = `${greeting}\n\n`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.getElementById('mainHtml').setAttribute('lang', currentLang);
            document.getElementById('mainHtml').setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
            document.getElementById('mainTitle').innerText = translations[currentLang].mainTitle;
            document.getElementById('chooseText').innerText = translations[currentLang].chooseText;
            document.getElementById('nameInput').placeholder = translations[currentLang].placeholder;
            document.querySelector('.lang-btn').innerText = translations[currentLang].langBtn;
            renderButtons();
        }

        window.onload = () => setEvent('ramadan');
    </script>
</body>
</html>
