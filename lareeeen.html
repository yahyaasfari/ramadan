<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English for Lareen</title>
    <style>
        body { 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f7ff; /* خلفية مريحة لـ لارين */
            padding: 20px; 
            direction: ltr;
        }
        h1 { color: #2c3e50; margin-bottom: 10px; font-size: 2.5rem; }
        
        /* نظام النقاط لـ لارين */
        .score-board {
            background: #fff;
            padding: 15px 25px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 30px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            border: 3px solid #f1c40f;
        }
        .score-board span { font-size: 1.5rem; font-weight: bold; color: #f39c12; }

        .container { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 12px; 
            max-width: 1000px; 
            margin: 0 auto; 
        }
        
        .word-card { 
            padding: 20px 10px; 
            border-radius: 15px; 
            cursor: pointer;
            transition: all 0.3s;
            width: 120px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .word-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
        .word-card h2 { margin: 0; font-size: 1.2rem; text-transform: capitalize; }

        /* ألوان لارين المميزة */
        .bg-0 { background-color: #ff6b6b; }
        .bg-1 { background-color: #4ecdc4; }
        .bg-2 { background-color: #45b7d1; }
        .bg-3 { background-color: #96ceb4; }
        .bg-4 { background-color: #f39c12; }

        .spelling-section {
            margin-top: 50px;
            padding: 30px;
            background: white;
            border-radius: 25px;
            display: inline-block;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 2px solid #eee;
            width: 95%;
            max-width: 600px;
        }
        .spelling-row { 
            margin: 15px 0; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f1f1f1;
        }
        
        input { 
            padding: 10px; 
            font-size: 1.1rem; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            width: 140px; 
            text-align: center;
            outline: none;
        }
        input.correct { border-color: #2ecc71; background-color: #e8f5e9; pointer-events: none; }
        input.incorrect { border-color: #e74c3c; background-color: #fdeaea; animation: shake 0.3s; }

        button {
            padding: 10px 15px;
            font-size: 0.9rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-listen { background-color: #3498db; color: white; }
        .btn-check { background-color: #f1c40f; color: #333; }
        .btn-check:disabled { background-color: #ddd; cursor: not-allowed; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .confetti {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            display: none;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <h1>Great Job, Lareen! 👋🌟</h1>
    
    <div class="score-board">
        <span>Lareen's Stars: <span id="star-count">0</span> ⭐</span>
    </div>

    <div class="container" id="cards-container"></div>

    <div class="spelling-section">
        <h3>⌨️ Spell the words</h3>
        <div id="spelling-rows-container"></div>
    </div>

    <div id="celebration" class="confetti">🌈✨🏆</div>

    <script>
        // كلمات لارين الـ 25
        const words = [
        "faraway", "mermaid", "shouting", "avocado", "formation", "asleep", 
            "elephant", "garbage", "breakfast", "leather", "weather", "brilliant", 
            "wooden", "valiant", "surprise", "countess", "eaten", "raise", 
            "february", "chocolate", "leaning", "unicorn", "cartwheel", "nervous", "acrobat"
        ];

        let stars = 0;
        const cardsContainer = document.getElementById('cards-container');
        const rowsContainer = document.getElementById('spelling-rows-container');
        const starDisplay = document.getElementById('star-count');

        words.forEach((word, index) => {
            const colorClass = `bg-${index % 5}`;
            cardsContainer.innerHTML += `
                <div class="word-card ${colorClass}" onclick="speak('${word}')">
                    <h2>${word}</h2>
                </div>
            `;

            rowsContainer.innerHTML += `
                <div class="spelling-row">
                    <button class="btn-listen" onclick="speak('${word}')">🔊 Listen</button>
                    <input type="text" id="in-${word}" placeholder="...">
                    <button class="btn-check" id="btn-${word}" onclick="check('${word}')">Check</button>
                </div>
            `;
        });

        function speak(word) {
            window.speechSynthesis.cancel();
            let msg = new SpeechSynthesisUtterance(word);
            msg.lang = 'en-US';
            msg.rate = 0.8; 
            window.speechSynthesis.speak(msg);
        }

        function check(word) {
            let input = document.getElementById('in-' + word);
            let btn = document.getElementById('btn-' + word);
            let val = input.value.trim().toLowerCase();
            
            if (val === word.toLowerCase()) {
                input.className = 'correct';
                btn.disabled = true;
                stars++;
                starDisplay.innerText = stars;
                
                speak("Excellent, Lareen! Well done!");
                showCelebration();
            } else {
                input.className = 'incorrect';
                speak("Try again Lareen");
                setTimeout(() => { if(input.className !== 'correct') input.className = ''; }, 1000);
            }
        }

        function showCelebration() {
            const el = document.getElementById('celebration');
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 1500);
        }

        document.body.addEventListener('click', function() {
            if (!window.welcomed) {
                speak("Hello Lareen, let's practice your words and win some stars!");
                window.welcomed = true;
            }
        }, { once: true });
    </script>

</body>
</html>
